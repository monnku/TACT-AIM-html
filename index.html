<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>TACT-AIM-html</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>

<iframe id="viewer" style="width:100%; height:100vh;"></iframe>

<script>
async function loadZip() {
    try {
        // 同じ階層の index.zip を取得
        const response = await fetch("./index.zip");
        if (!response.ok) throw new Error("ZIP取得失敗");

        const arrayBuffer = await response.arrayBuffer();

        // ZIPを解凍
        const zip = await JSZip.loadAsync(arrayBuffer);

        // index.html を取得
        const indexFile = zip.file("index.html");
        if (!indexFile) {
            document.body.innerHTML = "index.html が見つからない";
            return;
        }

        const htmlContent = await indexFile.async("string");

        // 表示
        const blob = new Blob([htmlContent], { type: "text/html" });
        const url = URL.createObjectURL(blob);
        document.getElementById("viewer").src = url;

    } catch (e) {
        document.body.innerHTML = "エラー: " + e.message;
    }
}

loadZip();
</script>

<style>
    #viewer {
        display: block;
        width: 100%;
        height: 100vh;
        border: none;           /* 枠を消す */
        outline: none;          /* フォーカス枠を消す */
        box-shadow: none;       /* 影を消す */
        margin: 0;
        padding: 0;
        background: transparent; /* 背景を透明に */
    }

    body {
        margin: 0;
        padding: 0;
        overflow: hidden;
    }
    html, body {
        height: 100%;
    }
</style>

</body>
</html>
